<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart | Half Shot Coffee</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/cart.css">
</head>
<body>
  <div id="header-placeholder"></div>

  <main class="container">
    <section class="cart-hero">
      <h1 class="cart-title font-display">YOUR SELECTIONS.</h1>
      <p class="cart-subtitle">A curated collection of your favorite roast and rituals, awaiting the final pour.</p>
    </section>

    <div class="cart-layout">
      <!-- Cart Items Section -->
      <div class="cart-items-container">
        <div class="cart-items-header">
          <div class="select-all">
            <input type="checkbox" id="select-all-checkbox">
            <label for="select-all-checkbox">SELECT ALL (3)</label>
          </div>
          <button class="clear-selected">CLEAR SELECTED</button>
        </div>

        <div class="cart-items-list">
          <!-- Dynamically populated by cart.js -->
          <p style="text-align: center; padding: 40px;">Loading your selections...</p>
        </div>
      </div>

      <!-- Order Summary Section -->
      <aside class="order-summary">
        <h2 class="summary-title">Order Summary</h2>
        <div class="summary-details">
          <div class="summary-row">
            <span>SUBTOTAL (0 ITEMS)</span>
          </div>
          <div class="summary-row">
            <span>ADDONS</span>
          </div>
          <div class="summary-row">
            <span>SHIPPING FEE</span>
          </div>
          <div class="summary-row total-row">
            <span class="total-label">TOTAL TO PAY</span>
            <span class="total-price">PHP 0.00</span>
          </div>
        </div>
        <button class="btn-checkout">CHECKOUT & PROCEED TO PAY</button>
      </aside>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
  <script src="js/cart.js"></script>
</body>
</html>
