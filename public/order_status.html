<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Status | Half Shot Coffee</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/order_status.css">
</head>
<body>
  <div id="header-placeholder"></div>

  <main class="container">
    <section class="order-hero">
      <h1 class="order-title font-display">ORDER TRACKING.</h1>
      <p class="order-subtitle">Follow your coffee's journey from bean to cup.</p>
    </section>

    <!-- Order Tracking Progress Bar -->
    <section class="order-tracking">
      <div class="tracking-progress-container">
        <div class="progress-line"></div>
        <div class="tracking-steps">
          <div class="step completed">
            <div class="step-icon">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="16" y1="2" x2="16" y2="6"></line>
                <line x1="8" y1="2" x2="8" y2="6"></line>
                <line x1="3" y1="10" x2="21" y2="10"></line>
              </svg>
            </div>
            <span class="step-label">Order Received</span>
          </div>
          <div class="step active">
            <div class="step-icon-glow"></div>
            <div class="step-icon">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 8h1a4 4 0 0 1 0 8h-1"></path>
                <path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"></path>
                <line x1="6" y1="1" x2="6" y2="4"></line>
                <line x1="10" y1="1" x2="10" y2="4"></line>
                <line x1="14" y1="1" x2="14" y2="4"></line>
              </svg>
            </div>
            <span class="step-label">Preparing</span>
          </div>
          <div class="step">
            <div class="step-icon">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"></path>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <path d="M16 10a4 4 0 0 1-8 0"></path>
              </svg>
            </div>
            <span class="step-label">Ready for Pickup</span>
          </div>
          <div class="step">
            <div class="step-icon">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <path d="M8 14s1.5 2 4 2 4-2 4-2"></path>
                <line x1="9" y1="9" x2="9.01" y2="9"></line>
                <line x1="15" y1="9" x2="15.01" y2="9"></line>
              </svg>
            </div>
            <span class="step-label">Enjoy!</span>
          </div>
        </div>
      </div>
    </section>

    <div class="order-layout">
      <!-- Order Details Section -->
      <div class="order-details-container">
        <div class="order-card">
          <h2 class="card-title">Order Details</h2>
          <div class="order-items-list">
            <!-- Dynamically populated by order_status.js -->
            <p style="text-align: center; padding: 40px;">Loading order details...</p>
          </div>
        </div>
      </div>

      <!-- Sidebar Section -->
      <aside class="order-sidebar">
        <!-- Estimated Time Card -->
        <div class="order-card sidebar-card time-card">
          <h2 class="card-title-small">Estimated Ready Time</h2>
          <div class="time-content">
            <span class="ready-time">--:--</span>
            <span class="pickup-estimate">Pickup in ~15 mins</span>
          </div>
        </div>

        <!-- Pickup Location Card -->
        <div class="order-card sidebar-card location-card">
          <h2 class="card-title-small">Pickup Location</h2>
          <div class="location-content">
            <div class="map-placeholder mock-map">
              <svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg" style="width: 100%; height: 100%; background: #f0f0f0;">
                <!-- Simple City Grid -->
                <line x1="0" y1="40" x2="400" y2="40" stroke="#ddd" stroke-width="1" />
                <line x1="0" y1="80" x2="400" y2="80" stroke="#ddd" stroke-width="1" />
                <line x1="0" y1="120" x2="400" y2="120" stroke="#ddd" stroke-width="1" />
                <line x1="0" y1="160" x2="400" y2="160" stroke="#ddd" stroke-width="1" />
                
                <line x1="40" y1="0" x2="40" y2="200" stroke="#ddd" stroke-width="1" />
                <line x1="80" y1="0" x2="80" y2="200" stroke="#ddd" stroke-width="1" />
                <line x1="120" y1="0" x2="120" y2="200" stroke="#ddd" stroke-width="1" />
                <line x1="160" y1="0" x2="160" y2="200" stroke="#ddd" stroke-width="1" />
                <line x1="200" y1="0" x2="200" y2="200" stroke="#ddd" stroke-width="1" />
                <line x1="240" y1="0" x2="240" y2="200" stroke="#ddd" stroke-width="1" />
                <line x1="280" y1="0" x2="280" y2="200" stroke="#ddd" stroke-width="1" />
                <line x1="320" y1="0" x2="320" y2="200" stroke="#ddd" stroke-width="1" />
                <line x1="360" y1="0" x2="360" y2="200" stroke="#ddd" stroke-width="1" />
                
                <!-- Main Road -->
                <path d="M 0 100 L 400 100" stroke="#ccc" stroke-width="8" fill="none" />
                <path d="M 200 0 L 200 200" stroke="#ccc" stroke-width="8" fill="none" />
                
                <!-- Marker -->
                <circle cx="200" cy="100" r="8" fill="#724128" />
                <circle cx="200" cy="100" r="15" fill="#724128" fill-opacity="0.2" />
                
                <!-- Coffee Shop Label -->
                <text x="215" y="105" font-family="sans-serif" font-size="12" font-weight="bold" fill="#724128">Half Shot Coffee</text>
              </svg>
            </div>
            <div class="location-details">
              <p class="address">123 Coffee Lane, Cityville</p>
              <a href="#" class="directions-link">Get Directions ↗</a>
            </div>
          </div>
        </div>

        <!-- Secondary Actions -->
        <div class="sidebar-actions">
          <button class="btn-help">Need Help?</button>
          <a href="#" class="view-receipt">View Receipt</a>
        </div>
      </aside>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
  <script src="js/order_status.js"></script>
</body>
</html>
