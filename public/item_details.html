<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fruit Soda | Half Shot Coffee</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/details.css">
</head>
<body>
  <div id="header-placeholder"></div>

  <main class="details-page" data-header-theme="light">
    <div class="container details-layout">
      <div class="details-image">
        <img src="https://www.figma.com/api/mcp/asset/e0e64626-ca4a-4e32-9a95-f78972e62b6a" alt="Fruit Soda">
      </div>
      
      <div class="details-content">
        <p class="section-label">BESTSELLER</p>
        <h1>FRUIT SODA</h1>
        <p class="section-desc">More than 100+ type of coffee are ready to serve by our professionals.</p>
        
        <div class="variation-section">
          <p class="section-subtitle">VARIATION</p>
          <div class="variation-grid">
            <button class="option-btn active">LYCHEE</button>
            <button class="option-btn">BLUEBERRY</button>
            <button class="option-btn">STRAWBERRY</button>
            <button class="option-btn">GREEN APPLE</button>
            <button class="option-btn">PASSIONFRUIT</button>
          </div>
        </div>

        <div class="size-section">
          <p class="section-subtitle">SIZE</p>
          <div style="display: flex; gap: 24px;">
            <button class="option-btn active" style="width: 136px;">16oz</button>
            <button class="option-btn" style="width: 136px;">22oz</button>
          </div>
        </div>

        <div class="addons-section">
          <p class="section-subtitle">ADD ONS</p>
          <div style="display: flex; gap: 24px;">
            <button class="option-btn active" style="width: 136px;">NATA</button>
            <button class="option-btn" style="width: 136px;">PEARL</button>
          </div>
        </div>

        <div class="quantity-section">
          <p class="section-subtitle">QUANTITY</p>
          <div class="quantity-controls">
            <button class="qty-btn minus">-</button>
            <div class="qty-input qty-val">1</div>
            <button class="qty-btn plus">+</button>
            <button class="btn btn-primary" style="width: 200px; border-radius: 48px; margin-left: 20px;">ADD TO CART</button>
            <span class="price-display">PHP 100.00</span>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
  <script src="js/details.js"></script>
</body>
</html>
