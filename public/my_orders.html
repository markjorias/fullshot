<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Orders | Half Shot Coffee</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/global.css">
  <style>
    .orders-page {
      padding: 120px 0 100px;
      min-height: 80vh;
    }
    .orders-title {
      font-size: 48px;
      margin-bottom: 40px;
      text-align: center;
    }
    .orders-list {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .order-card {
      background: white;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
    }
    .order-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
    .order-info h3 {
      font-size: 20px;
      margin-bottom: 8px;
      color: var(--dark-bg);
    }
    .order-info p {
      font-size: 14px;
      color: var(--text-muted);
    }
    .order-meta {
      text-align: right;
    }
    .order-status {
      display: inline-block;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .status-received { background: #e3f2fd; color: #1976d2; }
    .status-confirmed { background: #fff3e0; color: #f57c00; }
    .status-preparing { background: #f3e5f5; color: #7b1fa2; }
    .status-ready { background: #e8f5e9; color: #388e3c; }
    .status-completed { background: #f5f5f5; color: #616161; }
    
    .order-total {
      font-size: 18px;
      font-weight: 700;
      color: var(--primary-color);
    }
    .no-orders {
      text-align: center;
      padding: 60px;
    }
    .no-orders p {
      font-size: 18px;
      color: var(--text-muted);
      margin-bottom: 24px;
    }
  </style>
</head>
<body>
  <div id="header-placeholder"></div>

  <main class="orders-page container">
    <h1 class="orders-title font-display">Your Orders.</h1>
    
    <div id="orders-list" class="orders-list">
      <p style="text-align: center;">Loading your orders...</p>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
  <script src="js/my_orders.js"></script>
</body>
</html>
