<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Menu | Half Shot Coffee</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/menu.css">
</head>
<body>
  <div id="header-placeholder"></div>

  <main>
    <!-- Menu Hero (BLOCK-1) -->
    <section class="hero sub-hero" data-header-theme="dark">
      <div class="hero-bg">
        <img src="https://www.figma.com/api/mcp/asset/ee08268c-5d80-4b85-b42d-563505f646f7" alt="Menu Hero Background">
        <div class="hero-overlay"></div>
      </div>
      <div class="container hero-content" style="text-align: left; display: flex; flex-direction: column; align-items: flex-start;">
        <h1 class="hero-tagline" style="font-family: var(--font-main); font-size: 64px; width: auto; max-width: none; margin-bottom: 16px; white-space: nowrap; text-align: left;">OUR DELICIOUS MENU</h1>
        <p style="font-family: var(--font-main); font-weight: 500; font-size: 18px; max-width: 800px; margin: 0; text-align: left;">Lorem ipsum Lorem ipsum Lorem ipsum Lorem ipsum Lorem ipsum Lorem ipsum Lorem ipsum Lorem ipsum </p>
      </div>
    </section>

    <div class="container menu-page" data-header-theme="light">
    <div class="menu-layout">
      <!-- Sidebar Filters -->
      <aside class="menu-sidebar">
        <h2>Menu</h2>
        
        <h3>OUR DRINKS</h3>
        <div class="filter-item active">
          <div class="filter-icon"></div>
          <span>All</span>
        </div>
        <div class="filter-item">
          <div class="filter-icon"></div>
          <span>ICE COFFEE</span>
        </div>
        <div class="filter-item">
          <div class="filter-icon"></div>
          <span>HOT DRINKS</span>
        </div>
        <div class="filter-item">
          <div class="filter-icon"></div>
          <span>NON COFFEE</span>
        </div>

        <h3>OUR MEALS</h3>
        <div class="filter-item">
          <div class="filter-icon"></div>
          <span>LIGHT BITE SNACKS</span>
        </div>
        <div class="filter-item">
          <div class="filter-icon"></div>
          <span>RICE MEALS</span>
        </div>
        <div class="filter-item">
          <div class="filter-icon"></div>
          <span>NINETY-NINERS</span>
        </div>
        
        <hr style="margin: 20px 0; border: 0.5px solid #ccc;">
        
        <div class="filter-item">
          <div class="filter-icon"></div>
          <span>ADD-ONS</span>
        </div>
      </aside>

      <!-- Menu Items Grid -->
      <section class="menu-main">
        <div class="menu-grid">
          <!-- Dynamic items will be loaded here -->
        </div>

        <div class="pagination">
          <a href="#" class="btn btn-primary">NEXT</a>
        </div>
      </section>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
  <script src="js/menu.js"></script>
</body>
</html>
